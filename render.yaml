services:
  - type: web
    name: seder-pesach
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEONARDO_API_KEY
        sync: false
      - key: LEADER_EMAILS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
