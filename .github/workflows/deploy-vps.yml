name: Deploy to VPS (Beta)

on:
  push:
    branches:
      - master
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and rebuild Beta
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== Pulling latest code ==="
            cd /root/Seder_Pesah_Beta && git pull origin master

            echo "=== Rebuilding Beta container ==="
            cd /root && docker compose up -d --build app-beta

            echo "=== Done! ==="
            docker ps --filter "name=app-beta" --format "table {{.Names}}\t{{.Status}}"
